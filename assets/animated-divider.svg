<svg width="100%" height="2" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#0d1b2a" />
      <stop offset="25%" stop-color="#2176ae" />
      <stop offset="50%" stop-color="#90caf9" />
      <stop offset="75%" stop-color="#2176ae" />
      <stop offset="100%" stop-color="#0d1b2a" />
      <animate attributeName="x1" values="0%;-100%" dur="3s" repeatCount="indefinite" />
      <animate attributeName="x2" values="200%;100%" dur="3s" repeatCount="indefinite" />
    </linearGradient>
  </defs>
  <rect width="100%" height="2" fill="url(#gradient)" />
</svg>
